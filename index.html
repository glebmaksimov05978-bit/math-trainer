<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Счёт</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Счёт">
<link rel="apple-touch-icon" href="apple-touch-icon.PNG">
<link rel="icon" href="apple-touch-icon.PNG">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --accent:#7c6fff;
  --green:#3ddc84;
  --red:#ff5e5e;
  --yellow:#ffd166;
  --text:#e2e2f0;
  --dim:rgba(226,226,240,0.45);
  --card:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.1);
}

body{
  color:var(--text);
  font-family:'Space Grotesk',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

#bg{
  position:fixed;inset:0;z-index:0;
  background:linear-gradient(135deg,#0d0b1e 0%,#0f1a2e 40%,#0b1a0f 100%);
  background-size:cover;background-position:center;
  transition:background .4s ease;
}
#bg::after{
  content:'';position:absolute;inset:0;
  background:rgba(0,0,0,0.45);
}

.screen{display:none;position:relative;z-index:1;min-height:100vh;padding:24px 16px;max-width:600px;margin:0 auto}
.screen.active{display:flex;flex-direction:column}

/* HOME */
.home-header{padding:12px 0 4px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:30px;font-weight:700;letter-spacing:-1px}
.logo em{font-style:normal;color:var(--accent)}
.gear-btn{background:var(--card);border:1px solid var(--border);border-radius:12px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:.15s;backdrop-filter:blur(10px)}
.gear-btn:hover{border-color:var(--accent)}

.tagline{color:var(--dim);font-size:13px;margin-bottom:24px}

.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:28px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 10px;text-align:center;backdrop-filter:blur(12px)}
.stat-box .val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700}
.stat-box .lbl{font-size:10px;color:var(--dim);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

.section-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:12px}

.cats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:28px}
.cat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:.15s;position:relative;user-select:none;backdrop-filter:blur(12px)}
.cat-card:hover{border-color:var(--accent)}
.cat-card.selected{border-color:var(--accent);background:rgba(124,111,255,0.12)}
.cat-card.selected::after{content:'✓';position:absolute;top:10px;right:12px;color:var(--accent);font-size:13px;font-weight:700}
.cat-icon{font-size:20px;margin-bottom:8px}
.cat-name{font-size:14px;font-weight:600}
.cat-desc{font-size:12px;color:var(--dim);margin-top:3px;line-height:1.4}

.btn-row{display:flex;gap:8px;margin-bottom:16px}
.btn{flex:1;padding:16px;border:none;border-radius:14px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:.15s;backdrop-filter:blur(10px)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent)}

/* SETTINGS MODAL */
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#13131f;border:1px solid var(--border);border-radius:24px 24px 0 0;padding:28px 20px 40px;width:100%;max-width:600px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:24px}
.modal-close{float:right;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:4px 10px;cursor:pointer;color:var(--dim);font-size:18px}

.setting-row{margin-bottom:20px}
.setting-label{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:10px}

.timer-options{display:flex;gap:8px}
.timer-opt{flex:1;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;text-align:center;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;transition:.15s}
.timer-opt.active{border-color:var(--accent);background:rgba(124,111,255,0.15);color:var(--accent)}

.bg-options{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.bg-opt{height:56px;border-radius:12px;cursor:pointer;border:2px solid transparent;transition:.15s;position:relative;overflow:hidden}
.bg-opt.active{border-color:var(--accent)}
.bg-opt.active::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;background:rgba(0,0,0,0.3)}

.upload-btn{width:100%;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;cursor:pointer;text-align:center}
.upload-btn:hover{border-color:var(--accent)}
#fileInput{display:none}

/* GAME */
#game{gap:0;justify-content:space-between}
.game-top{display:flex;justify-content:space-between;align-items:center;padding:8px 0 20px}
.back-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--dim);font-size:18px;cursor:pointer;padding:6px 12px;backdrop-filter:blur(10px)}
.timer-bar-wrap{flex:1;margin:0 16px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.timer-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .1s linear}
.timer-bar.urgent{background:var(--red)}
.round-badge{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--dim)}

.question-area{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 0 24px}
.cat-tag{display:inline-block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);background:rgba(124,111,255,.12);border:1px solid rgba(124,111,255,.2);padding:4px 10px;border-radius:20px;margin-bottom:20px}
.question-text{font-size:20px;font-weight:600;line-height:1.4;margin-bottom:6px}
.question-hint{font-size:13px;color:var(--dim);margin-bottom:28px}

.input-wrap{position:relative}
.answer-input{width:100%;background:var(--card);border:2px solid var(--border);border-radius:14px;padding:18px 60px 18px 20px;font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--text);outline:none;transition:.15s;text-align:center;backdrop-filter:blur(12px)}
.answer-input:focus{border-color:var(--accent)}
.answer-input.correct{border-color:var(--green);background:rgba(61,220,132,.08)}
.answer-input.wrong{border-color:var(--red);background:rgba(255,94,94,.08)}
.unit-label{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:13px;font-family:'JetBrains Mono',monospace}

.submit-btn{width:100%;padding:18px;background:var(--accent);border:none;border-radius:14px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px;transition:.15s}
.submit-btn:hover{filter:brightness(1.1)}

.feedback-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-top:16px;display:none;backdrop-filter:blur(12px)}
.feedback-card.show{display:block}
.feedback-result{font-size:14px;font-weight:600;margin-bottom:6px}
.feedback-result.ok{color:var(--green)}
.feedback-result.fail{color:var(--red)}
.feedback-text{font-size:13px;color:var(--dim);line-height:1.6;white-space:pre-line}
.feedback-hack{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;color:var(--accent)}

.next-q-btn{width:100%;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:14px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;display:none;backdrop-filter:blur(10px)}
.next-q-btn.show{display:block}
.next-q-btn:hover{border-color:var(--accent)}

/* RESULT */
#result{align-items:center;justify-content:center;text-align:center;gap:20px}
.result-emoji{font-size:56px}
.result-score{font-family:'JetBrains Mono',monospace;font-size:64px;font-weight:700;color:var(--accent);line-height:1}
.result-label{color:var(--dim);font-size:14px;margin-top:-8px}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
.r-stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;backdrop-filter:blur(12px)}
.r-stat .v{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700}
.r-stat .l{font-size:12px;color:var(--dim);margin-top:4px}
.result-btns{display:flex;flex-direction:column;gap:8px;width:100%}

/* REF */
#ref{gap:0}
.ref-header{padding:8px 0 24px;display:flex;align-items:center;gap:12px}
.ref-header h2{font-size:20px;font-weight:700}
.ref-section{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;backdrop-filter:blur(12px)}
.ref-section-header{padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600}
.ref-section-body{padding:0 20px 20px;display:none}
.ref-section-body.open{display:block}
.formula-box{background:rgba(124,111,255,.08);border:1px solid rgba(124,111,255,.2);border-radius:10px;padding:14px;margin-bottom:12px}
.formula-box code{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);display:block;margin-bottom:6px}
.formula-box p{font-size:13px;color:var(--dim);line-height:1.5}
.hacks-list{list-style:none}
.hacks-list li{font-size:13px;color:var(--dim);padding:8px 0;border-bottom:1px solid var(--border);line-height:1.5}
.hacks-list li:last-child{border-bottom:none}
.hacks-list li::before{content:'⚡ ';color:var(--yellow)}
</style>
</head>
<body>
<div id="bg"></div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <button class="modal-close" onclick="closeSettings()">✕</button>
    <div class="modal-title">Настройки</div>

    <div class="setting-row">
      <div class="setting-label">Время на вопрос</div>
      <div class="timer-options">
        <div class="timer-opt" data-t="10" onclick="setTimer(10)">10с</div>
        <div class="timer-opt active" data-t="20" onclick="setTimer(20)">20с</div>
        <div class="timer-opt" data-t="30" onclick="setTimer(30)">30с</div>
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-label">Фон</div>
      <div class="bg-options" id="bgOptions">
        <div class="bg-opt active" data-bg="0" style="background:linear-gradient(135deg,#0d0b1e,#0f1a2e,#0b1a0f)" onclick="setBg(0)"></div>
        <div class="bg-opt" data-bg="1" style="background:linear-gradient(135deg,#1a0b0b,#2e1a0f,#1a1a0b)" onclick="setBg(1)"></div>
        <div class="bg-opt" data-bg="2" style="background:linear-gradient(135deg,#0b0b1a,#1a0b2e,#0b1a1a)" onclick="setBg(2)"></div>
        <div class="bg-opt" data-bg="3" style="background:linear-gradient(135deg,#0a0a0a,#1a1a1a,#0f0f0f)" onclick="setBg(3)"></div>
      </div>
      <label class="upload-btn" for="fileInput">📷 Загрузить своё фото</label>
      <input type="file" id="fileInput" accept="image/*" onchange="uploadBg(event)">
    </div>
  </div>
</div>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="home-header">
    <div>
      <div class="logo">счёт<em>.</em></div>
      <div class="tagline">тренажёр быстрого счёта для трейдера</div>
    </div>
    <button class="gear-btn" onclick="openSettings()">⚙️</button>
  </div>

  <div class="stats-row">
    <div class="stat-box"><div class="val" id="h-score">0</div><div class="lbl">очки</div></div>
    <div class="stat-box"><div class="val" id="h-streak">0</div><div class="lbl">серия</div></div>
    <div class="stat-box"><div class="val" id="h-acc">—</div><div class="lbl">точность</div></div>
  </div>

  <div class="section-title">выбери категории</div>
  <div class="cats-grid" id="catsGrid"></div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="startGame()">Начать →</button>
    <button class="btn btn-secondary" onclick="showScreen('ref')">Справочник</button>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div class="game-top">
    <button class="back-btn" onclick="showScreen('home')">←</button>
    <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar"></div></div>
    <div class="round-badge" id="roundBadge">1/10</div>
  </div>
  <div class="question-area">
    <div><span class="cat-tag" id="catTag">Проценты</span></div>
    <div class="question-text" id="questionText">Загрузка...</div>
    <div class="question-hint" id="questionHint"></div>
    <div class="input-wrap">
      <input class="answer-input" id="answerInput" type="number" placeholder="?" autocomplete="off" onkeydown="handleKey(event)">
      <span class="unit-label" id="unitLabel"></span>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitAnswer()">Проверить</button>
    <div class="feedback-card" id="feedbackCard">
      <div class="feedback-result" id="feedbackResult"></div>
      <div class="feedback-text" id="feedbackText"></div>
      <div class="feedback-hack" id="feedbackHack"></div>
    </div>
    <button class="next-q-btn" id="nextQBtn" onclick="nextQuestion()">Следующий →</button>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <div class="result-emoji" id="resultEmoji">🎯</div>
  <div class="result-score" id="resultScore">0</div>
  <div class="result-label">очков</div>
  <div class="result-stats">
    <div class="r-stat"><div class="v" id="r-correct">0</div><div class="l">верно</div></div>
    <div class="r-stat"><div class="v" id="r-wrong">0</div><div class="l">неверно</div></div>
    <div class="r-stat"><div class="v" id="r-streak">0</div><div class="l">лучшая серия</div></div>
    <div class="r-stat"><div class="v" id="r-acc">0%</div><div class="l">точность</div></div>
  </div>
  <div class="result-btns">
    <button class="btn btn-primary" onclick="startGame()">Ещё раз</button>
    <button class="btn btn-secondary" onclick="showScreen('home')">На главную</button>
  </div>
</div>

<!-- REF -->
<div class="screen" id="ref">
  <div class="ref-header">
    <button class="back-btn" onclick="showScreen('home')">←</button>
    <h2>Справочник</h2>
  </div>
  <div id="refContent"></div>
</div>

<script>
const BGOPTS=[
  'linear-gradient(135deg,#0d0b1e 0%,#0f1a2e 40%,#0b1a0f 100%)',
  'linear-gradient(135deg,#1a0808 0%,#2e150a 50%,#1a1008 100%)',
  'linear-gradient(135deg,#080816 0%,#140830 50%,#081616 100%)',
  'linear-gradient(135deg,#080808 0%,#141414 50%,#0a0a0a 100%)',
];
let activeBg=0, timerSeconds=20;

function setBg(idx){
  activeBg=idx;
  document.getElementById('bg').style.backgroundImage='none';
  document.getElementById('bg').style.background=BGOPTS[idx];
  document.querySelectorAll('.bg-opt').forEach(el=>el.classList.toggle('active',+el.dataset.bg===idx));
}

function uploadBg(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    document.getElementById('bg').style.background='none';
    document.getElementById('bg').style.backgroundImage=`url(${ev.target.result})`;
    document.querySelectorAll('.bg-opt').forEach(el=>el.classList.remove('active'));
    activeBg=-1;
  };
  reader.readAsDataURL(file);
}

function setTimer(t){
  timerSeconds=t;
  document.querySelectorAll('.timer-opt').forEach(el=>el.classList.toggle('active',+el.dataset.t===t));
}

function openSettings(){document.getElementById('settingsModal').classList.add('show')}
function closeSettings(){document.getElementById('settingsModal').classList.remove('show')}

const CATS=[
  {id:'pct',icon:'%',name:'Проценты',desc:'X% от числа, изменение цены, рост/падение',
    ref:{
      formulas:[
        {code:'X% от N = N × X / 100',desc:'Пример: 15% от 200 = 200×15/100 = 30'},
        {code:'% изменения = (Новое − Старое) / Старое × 100',desc:'Как вырос или упал актив'},
        {code:'Новая цена = Старая × (1 + % / 100)',desc:'Цена после роста на X%'},
      ],
      hacks:['10% — убери последний ноль. 10% от 840 = 84','5% — найди 10% и дели на 2','1% — сдвинь запятую на 2 влево','15% = 10% + 5%. Считай по частям','Рост 20% потом падение 20% ≠ 0. Будет −4%']
    },
    questions:()=>{
      const types=['find_pct','change_price','pct_change','reverse'];
      const t=types[Math.floor(Math.random()*types.length)];
      if(t==='find_pct'){
        const bases=[200,500,1000,2500,4800,150,3600,800];
        const pcts=[5,10,15,20,25,30,2,1];
        const b=bases[Math.floor(Math.random()*bases.length)];
        const p=pcts[Math.floor(Math.random()*pcts.length)];
        const ans=Math.round(b*p/100);
        return{q:`Найди ${p}% от ${b.toLocaleString('ru')}`,hint:'',ans,unit:'',solution:`${b} × ${p} / 100 = ${ans}`,hack:p===10?'10%: убери ноль':p===5?'5% = половина от 10%':'Умножь на '+p+' и дели на 100'};
      }
      if(t==='change_price'){
        const prices=[100,200,500,1000,2500,50,800];
        const pcts=[5,10,15,20,25,50,30];
        const up=Math.random()>0.5;
        const p=prices[Math.floor(Math.random()*prices.length)];
        const pct=pcts[Math.floor(Math.random()*pcts.length)];
        const ans=Math.round(p*(1+(up?1:-1)*pct/100));
        return{q:`Акция ${p}₽, ${up?'выросла':'упала'} на ${pct}%. Новая цена?`,hint:'',ans,unit:'₽',solution:`${p} × ${(up?1+pct/100:1-pct/100).toFixed(2)} = ${ans}`,hack:`${p} × (1 ${up?'+':'-'} ${pct}/100)`};
      }
      if(t==='pct_change'){
        const olds=[100,200,500,1000,800,400];
        const deltas=[10,20,50,100,40,-50,-20,-100];
        const o=olds[Math.floor(Math.random()*olds.length)];
        const d=deltas[Math.floor(Math.random()*deltas.length)];
        const n=o+d;
        const ans=Math.round((n-o)/o*100);
        return{q:`Цена: ${o}₽ → ${n}₽. Изменение в %?`,hint:'',ans,unit:'%',solution:`(${n}−${o}) / ${o} × 100 = ${ans}%`,hack:'(Новое − Старое) / Старое × 100'};
      }
      const bases=[100,200,500,1000,300];
      const pcts=[10,20,25,50,15,5];
      const b=bases[Math.floor(Math.random()*bases.length)];
      const p=pcts[Math.floor(Math.random()*pcts.length)];
      const pv=Math.round(b*p/100);
      return{q:`${p}% от числа = ${pv}. Найди само число.`,hint:'',ans:b,unit:'',solution:`${pv} / ${p} × 100 = ${b}`,hack:'Раздели на процент, умножь на 100'};
    }
  },
  {id:'risk',icon:'🛡',name:'Риск-менеджмент',desc:'Стоп-лосс, размер позиции, риск на сделку',
    ref:{
      formulas:[
        {code:'Риск в ₽ = Акций × (Вход − Стоп)',desc:'Сколько потеряешь если сработает стоп'},
        {code:'Акций = (Депозит × % риска / 100) / (Вход − Стоп)',desc:'Размер позиции через % от депозита'},
        {code:'Risk/Reward = Профит / Риск',desc:'Должен быть ≥ 2 для хорошей сделки'},
      ],
      hacks:['Риск 1% от 100к = 1000₽ — запомни как базу','Стоп 5₽, риск 500₽ → 500/5 = 100 акций','R/R 1:3 значит за 1 риск получаешь 3 профита','Считай в ₽ от депозита, не в % от позиции']
    },
    questions:()=>{
      const types=['stop_rub','pos_size','rr'];
      const t=types[Math.floor(Math.random()*types.length)];
      if(t==='stop_rub'){
        const qtys=[10,20,50,100,200];
        const entries=[100,250,500,1000,280];
        const stops=[5,10,20,50,15];
        const q=qtys[Math.floor(Math.random()*qtys.length)];
        const e=entries[Math.floor(Math.random()*entries.length)];
        const s=stops[Math.floor(Math.random()*stops.length)];
        return{q:`${q} акций по ${e}₽. Стоп на ${e-s}₽. Риск в рублях?`,hint:'',ans:q*s,unit:'₽',solution:`${q} × (${e}−${e-s}) = ${q*s}₽`,hack:'Акций × (Вход − Стоп)'};
      }
      if(t==='pos_size'){
        const deps=[50000,100000,200000,500000];
        const pcts=[1,2,3];
        const gaps=[5,10,20,50,25];
        const d=deps[Math.floor(Math.random()*deps.length)];
        const p=pcts[Math.floor(Math.random()*pcts.length)];
        const g=gaps[Math.floor(Math.random()*gaps.length)];
        const rr=d*p/100;
        const ans=Math.floor(rr/g);
        return{q:`Депозит ${(d/1000).toFixed(0)}к₽. Риск ${p}%. Стоп ${g}₽. Сколько акций?`,hint:'',ans,unit:'акций',solution:`(${d}×${p}%) / ${g} = ${rr} / ${g} = ${ans}`,hack:'Сначала риск в ₽, потом дели на стоп'};
      }
      const risks=[500,1000,2000,3000];
      const profits=[1000,1500,2000,4000,6000,9000];
      const r=risks[Math.floor(Math.random()*risks.length)];
      const pr=profits[Math.floor(Math.random()*profits.length)];
      const ans=Math.round(pr/r*10)/10;
      return{q:`Риск ${r}₽, профит ${pr}₽. R/R?`,hint:'',ans,unit:':1',solution:`${pr} / ${r} = ${ans}`,hack:'R/R ≥ 2 — хорошая сделка'};
    }
  },
  {id:'credit',icon:'🏦',name:'Кредиты и вклады',desc:'Переплата, эффективная ставка, сложный процент',
    ref:{
      formulas:[
        {code:'Переплата = Сумма × Ставка% / 100 × Лет',desc:'Простые проценты'},
        {code:'Итог = Сумма × (1 + Ставка/100)^Лет',desc:'Сложный процент: процент на процент'},
        {code:'Реальная ставка = Номинал − Инфляция',desc:'Сколько реально зарабатываешь'},
      ],
      hacks:['Правило 72: 72 / Ставку = лет до удвоения. 8% → 9 лет','10% на 10 лет простые = 100% (удвоение)','Реальная доходность вклада 14% при инфляции 9% = реальные 5%']
    },
    questions:()=>{
      const types=['simple','rule72','real'];
      const t=types[Math.floor(Math.random()*types.length)];
      if(t==='simple'){
        const sums=[10000,50000,100000,200000,500000];
        const rates=[5,10,12,15,20];
        const years=[1,2,3,5];
        const s=sums[Math.floor(Math.random()*sums.length)];
        const r=rates[Math.floor(Math.random()*rates.length)];
        const y=years[Math.floor(Math.random()*years.length)];
        const ans=Math.round(s*r/100*y);
        return{q:`Вклад ${(s/1000).toFixed(0)}к₽ под ${r}% на ${y} ${y===1?'год':y<5?'года':'лет'}. Доход?`,hint:'',ans,unit:'₽',solution:`${s}×${r}/100×${y} = ${ans}₽`,hack:`1% = ${s/100}₽, значит ${r}% = ${s*r/100}₽/год`};
      }
      if(t==='rule72'){
        const rates=[6,8,9,12,18,24,36];
        const r=rates[Math.floor(Math.random()*rates.length)];
        return{q:`При ${r}% годовых — за сколько лет удвоится капитал?`,hint:'Правило 72',ans:Math.round(72/r),unit:'лет',solution:`72 / ${r} ≈ ${Math.round(72/r)} лет`,hack:'Правило 72 — быстрая оценка без калькулятора'};
      }
      const noms=[10,12,14,16,20];
      const infs=[4,5,6,7,9,10];
      const n=noms[Math.floor(Math.random()*noms.length)];
      const inf=infs[Math.floor(Math.random()*infs.length)];
      return{q:`Вклад ${n}%, инфляция ${inf}%. Реальная доходность?`,hint:'',ans:n-inf,unit:'%',solution:`${n}−${inf} = ${n-inf}%`,hack:'Если отрицательная — деньги тают даже на вкладе'};
    }
  },
  {id:'margin',icon:'📊',name:'Маржа и прибыль',desc:'Наценка, маржинальность, точка безубыточности',
    ref:{
      formulas:[
        {code:'Маржа = (Цена − Себест) / Цена × 100%',desc:'Доля прибыли в цене продажи'},
        {code:'Наценка = (Цена − Себест) / Себест × 100%',desc:'На сколько % выше себестоимости'},
        {code:'ТБУ = Фикс.затраты / (Цена − Переменные)',desc:'Минимум продаж чтобы выйти в ноль'},
      ],
      hacks:['Маржа 50% ≠ наценка 50%. Маржа 50% = наценка 100%','Маржа всегда < 100%, наценка может быть любой','Маржа = 1 − (Себест/Цена)']
    },
    questions:()=>{
      const types=['margin','markup','breakeven'];
      const t=types[Math.floor(Math.random()*types.length)];
      if(t==='margin'){
        const pairs=[[100,150],[200,300],[500,800],[1000,1500],[400,600]];
        const [c,p]=pairs[Math.floor(Math.random()*pairs.length)];
        const ans=Math.round((p-c)/p*100);
        return{q:`Себест. ${c}₽, цена ${p}₽. Маржа?`,hint:'',ans,unit:'%',solution:`(${p}−${c}) / ${p} × 100 = ${ans}%`,hack:'Маржа — от цены. Наценка — от себестоимости!'};
      }
      if(t==='markup'){
        const costs=[100,200,500,1000,50];
        const ups=[50,100,25,200,150];
        const c=costs[Math.floor(Math.random()*costs.length)];
        const u=ups[Math.floor(Math.random()*ups.length)];
        const p=Math.round(c*(1+u/100));
        return{q:`Купил за ${c}₽, продал за ${p}₽. Наценка?`,hint:'',ans:u,unit:'%',solution:`(${p}−${c}) / ${c} × 100 = ${u}%`,hack:'Наценка от себестоимости, маржа от цены'};
      }
      const pairs2=[[10000,50,100],[20000,100,200],[50000,200,400],[100000,500,800]];
      const [f,v,s]=pairs2[Math.floor(Math.random()*pairs2.length)];
      const ans=Math.round(f/(s-v));
      return{q:`Фикс ${f}₽, цена ${s}₽, перем. ${v}₽. ТБУ (шт)?`,hint:'',ans,unit:'шт',solution:`${f} / (${s}−${v}) = ${ans} шт`,hack:'Это минимум продаж чтобы не уйти в минус'};
    }
  }
];

let totalScore=0,totalCorrect=0,totalAnswered=0,bestStreak=0;
let selectedCats=new Set(['pct','risk']);
let curRound=0,totalRounds=10,curQ=null,gameScore=0,gameCorrect=0,gameWrong=0;
let curStreak=0,roundBestStreak=0;
let timerInterval=null,timeLeft=20,answered=false;

function initCats(){
  const grid=document.getElementById('catsGrid');
  grid.innerHTML='';
  CATS.forEach(c=>{
    const el=document.createElement('div');
    el.className='cat-card'+(selectedCats.has(c.id)?' selected':'');
    el.innerHTML=`<div class="cat-icon">${c.icon}</div><div class="cat-name">${c.name}</div><div class="cat-desc">${c.desc}</div>`;
    el.onclick=()=>{
      if(selectedCats.has(c.id)){if(selectedCats.size>1)selectedCats.delete(c.id);}
      else selectedCats.add(c.id);
      el.classList.toggle('selected',selectedCats.has(c.id));
    };
    grid.appendChild(el);
  });
}

function updateHomeStats(){
  document.getElementById('h-score').textContent=totalScore;
  document.getElementById('h-streak').textContent=bestStreak;
  document.getElementById('h-acc').textContent=totalAnswered?Math.round(totalCorrect/totalAnswered*100)+'%':'—';
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='home'){updateHomeStats();initCats();}
  if(id==='ref')buildRef();
}

function startGame(){
  if(selectedCats.size===0)return;
  curRound=0;gameScore=0;gameCorrect=0;gameWrong=0;curStreak=0;roundBestStreak=0;
  showScreen('game');
  nextQuestion();
}

function nextQuestion(){
  if(curRound>=totalRounds){endGame();return;}
  curRound++;answered=false;
  document.getElementById('roundBadge').textContent=curRound+'/'+totalRounds;
  document.getElementById('feedbackCard').classList.remove('show');
  document.getElementById('nextQBtn').classList.remove('show');
  document.getElementById('submitBtn').style.display='block';
  document.getElementById('answerInput').value='';
  document.getElementById('answerInput').classList.remove('correct','wrong');
  document.getElementById('answerInput').disabled=false;
  document.getElementById('answerInput').focus();
  const cats=[...selectedCats];
  const catId=cats[Math.floor(Math.random()*cats.length)];
  const cat=CATS.find(c=>c.id===catId);
  curQ={...cat.questions(),catName:cat.name};
  document.getElementById('catTag').textContent=cat.name;
  document.getElementById('questionText').textContent=curQ.q;
  document.getElementById('questionHint').textContent=curQ.hint||'';
  document.getElementById('unitLabel').textContent=curQ.unit||'';
  startTimer();
}

function startTimer(){
  clearInterval(timerInterval);
  timeLeft=timerSeconds;
  const bar=document.getElementById('timerBar');
  bar.style.width='100%';bar.classList.remove('urgent');
  timerInterval=setInterval(()=>{
    timeLeft-=0.1;
    bar.style.width=Math.max(0,timeLeft/timerSeconds*100)+'%';
    if(timeLeft<=timerSeconds*0.3)bar.classList.add('urgent');
    if(timeLeft<=0){clearInterval(timerInterval);timeExpired();}
  },100);
}

function timeExpired(){if(answered)return;answered=true;clearInterval(timerInterval);showFeedback(false,true);}
function handleKey(e){if(e.key==='Enter')submitAnswer();}

function submitAnswer(){
  if(answered)return;
  const val=parseFloat(document.getElementById('answerInput').value);
  if(isNaN(val))return;
  answered=true;clearInterval(timerInterval);
  const correct=Math.abs(val-curQ.ans)<=Math.max(0.5,Math.abs(curQ.ans)*0.02);
  showFeedback(correct,false);
}

function showFeedback(correct,timeout){
  const input=document.getElementById('answerInput');
  input.disabled=true;
  input.classList.add(correct?'correct':'wrong');
  if(correct){gameCorrect++;totalCorrect++;curStreak++;roundBestStreak=Math.max(roundBestStreak,curStreak);const pts=10+curStreak*2;gameScore+=pts;}
  else{gameWrong++;curStreak=0;}
  totalAnswered++;
  const card=document.getElementById('feedbackCard');
  document.getElementById('feedbackResult').className='feedback-result '+(correct?'ok':'fail');
  document.getElementById('feedbackResult').textContent=timeout?'⏱ Время вышло!':(correct?'✓ Верно!':'✗ Неверно');
  document.getElementById('feedbackText').textContent=`Правильный ответ: ${curQ.ans}${curQ.unit}\n${curQ.solution}`;
  document.getElementById('feedbackHack').textContent=curQ.hack?'⚡ Лайфхак: '+curQ.hack:'';
  card.classList.add('show');
  document.getElementById('submitBtn').style.display='none';
  document.getElementById('nextQBtn').classList.add('show');
}

function endGame(){
  bestStreak=Math.max(bestStreak,roundBestStreak);totalScore+=gameScore;
  const acc=gameCorrect+gameWrong>0?Math.round(gameCorrect/(gameCorrect+gameWrong)*100):0;
  const emoji=acc>=90?'🔥':acc>=70?'🎯':acc>=50?'💪':'📈';
  document.getElementById('resultEmoji').textContent=emoji;
  document.getElementById('resultScore').textContent=gameScore;
  document.getElementById('r-correct').textContent=gameCorrect;
  document.getElementById('r-wrong').textContent=gameWrong;
  document.getElementById('r-streak').textContent=roundBestStreak;
  document.getElementById('r-acc').textContent=acc+'%';
  showScreen('result');
}

function buildRef(){
  const el=document.getElementById('refContent');
  el.innerHTML='';
  CATS.forEach(c=>{
    const sec=document.createElement('div');
    sec.className='ref-section';
    let inner=`<div class="ref-section-header" onclick="toggleRef(this)">${c.icon} ${c.name}<span>↓</span></div><div class="ref-section-body">`;
    c.ref.formulas.forEach(f=>{inner+=`<div class="formula-box"><code>${f.code}</code><p>${f.desc}</p></div>`;});
    inner+='<ul class="hacks-list">';
    c.ref.hacks.forEach(h=>{inner+=`<li>${h}</li>`;});
    inner+='</ul></div>';
    sec.innerHTML=inner;el.appendChild(sec);
  });
}

function toggleRef(header){
  const body=header.nextElementSibling;
  body.classList.toggle('open');
  header.querySelector('span').textContent=body.classList.contains('open')?'↑':'↓';
}

initCats();updateHomeStats();
</script>
</body>
