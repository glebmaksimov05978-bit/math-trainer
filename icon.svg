<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0b1e"/>
      <stop offset="50%" style="stop-color:#0f1a2e"/>
      <stop offset="100%" style="stop-color:#0b1a0f"/>
    </linearGradient>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d8fff"/>
      <stop offset="100%" style="stop-color:#6040ff"/>
    </linearGradient>
    <linearGradient id="bead1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a0f0c0"/>
      <stop offset="100%" style="stop-color:#3ddc84"/>
    </linearGradient>
    <linearGradient id="bead2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b0a0ff"/>
      <stop offset="100%" style="stop-color:#7c6fff"/>
    </linearGradient>
    <linearGradient id="bead3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffdf80"/>
      <stop offset="100%" style="stop-color:#ffd166"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="110" ry="110"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.06" fill="#7c6fff">
    <circle cx="80" cy="80" r="3"/><circle cx="160" cy="80" r="3"/><circle cx="240" cy="80" r="3"/>
    <circle cx="320" cy="80" r="3"/><circle cx="400" cy="80" r="3"/><circle cx="430" cy="80" r="3"/>
    <circle cx="80" cy="430" r="3"/><circle cx="160" cy="430" r="3"/><circle cx="400" cy="430" r="3"/>
  </g>

  <!-- Abacus frame -->
  <!-- Outer frame -->
  <rect x="96" y="130" width="320" height="252" rx="18" fill="none" stroke="url(#frame)" stroke-width="12"/>

  <!-- Top bar -->
  <rect x="96" y="148" width="320" height="14" rx="4" fill="url(#frame)" opacity="0.6"/>
  <!-- Bottom bar -->
  <rect x="96" y="356" width="320" height="14" rx="4" fill="url(#frame)" opacity="0.6"/>

  <!-- Vertical rods -->
  <line x1="176" y1="148" x2="176" y2="370" stroke="#3a3560" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="148" x2="256" y2="370" stroke="#3a3560" stroke-width="6" stroke-linecap="round"/>
  <line x1="336" y1="148" x2="336" y2="370" stroke="#3a3560" stroke-width="6" stroke-linecap="round"/>

  <!-- Middle divider -->
  <rect x="96" y="246" width="320" height="10" rx="3" fill="url(#frame)" opacity="0.5"/>

  <!-- ROW 1 top (green beads - pushed down) -->
  <ellipse cx="176" cy="230" rx="22" ry="14" fill="url(#bead1)" filter="url(#glow)"/>
  <ellipse cx="176" cy="230" rx="14" ry="8" fill="rgba(255,255,255,0.25)"/>

  <ellipse cx="256" cy="215" rx="22" ry="14" fill="url(#bead1)" filter="url(#glow)"/>
  <ellipse cx="256" cy="215" rx="14" ry="8" fill="rgba(255,255,255,0.25)"/>

  <ellipse cx="336" cy="230" rx="22" ry="14" fill="url(#bead1)" filter="url(#glow)" opacity="0.4"/>
  <ellipse cx="336" cy="230" rx="14" ry="8" fill="rgba(255,255,255,0.15)"/>

  <!-- ROW 2 bottom (purple beads) -->
  <ellipse cx="176" cy="290" rx="22" ry="14" fill="url(#bead2)" filter="url(#glow)"/>
  <ellipse cx="176" cy="290" rx="14" ry="8" fill="rgba(255,255,255,0.25)"/>

  <ellipse cx="176" cy="320" rx="22" ry="14" fill="url(#bead2)" filter="url(#glow)"/>
  <ellipse cx="176" cy="320" rx="14" ry="8" fill="rgba(255,255,255,0.25)"/>

  <ellipse cx="256" cy="290" rx="22" ry="14" fill="url(#bead2)" filter="url(#glow)" opacity="0.4"/>
  <ellipse cx="256" cy="290" rx="14" ry="8" fill="rgba(255,255,255,0.15)"/>

  <ellipse cx="256" cy="320" rx="22" ry="14" fill="url(#bead3)" filter="url(#glow)"/>
  <ellipse cx="256" cy="320" rx="14" ry="8" fill="rgba(255,255,255,0.25)"/>

  <ellipse cx="336" cy="290" rx="22" ry="14" fill="url(#bead3)" filter="url(#glow)"/>
  <ellipse cx="336" cy="290" rx="14" ry="8" fill="rgba(255,255,255,0.25)"/>

  <ellipse cx="336" cy="320" rx="22" ry="14" fill="url(#bead2)" filter="url(#glow)" opacity="0.4"/>
  <ellipse cx="336" cy="320" rx="14" ry="8" fill="rgba(255,255,255,0.15)"/>

  <!-- Glow accent at bottom -->
  <ellipse cx="256" cy="470" rx="120" ry="20" fill="#7c6fff" opacity="0.12"/>
</svg>
